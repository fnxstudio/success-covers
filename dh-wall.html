<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darren Hardy – Success Wall</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: #000;
  color: #fff;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* ── Minimal page chrome — gives "real webpage" sizing context ── */
.site-nav {
  height: 68px;
  display: flex;
  align-items: center;
  padding: 0 48px;
  background: #000;
  border-bottom: 1px solid #1c1c1c;
  position: relative;
  z-index: 100;
}
.site-nav .logo {
  font-size: 13px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  opacity: 0.5;
}

/* ── Hero band ── */
.hero {
  position: relative;
  width: 100%;
  height: calc(100vh - 68px);
  overflow: hidden;
  background: #000;
}

/* ── Covers wall — fills hero as background ── */
#wall {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-auto-rows: calc((100vh - 68px) / 3);
  grid-auto-flow: dense;
  gap: 2px;
  /* Extra rows overflow hidden — creates the "wall" crop */
}

.tile {
  overflow: hidden;
  background: #0a0a0a;
  opacity: 0;
  transform: scale(0.96);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.tile.visible { opacity: 1; transform: scale(1); }

.tile img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
  /* Full colour — this is the wall, not the gallery */
}

/* ── Dark gradient vignette — makes covers recede so DH pops ── */
.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 55% 100% at 50% 100%, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.65) 100%),
    linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.5) 100%);
  pointer-events: none;
  z-index: 2;
}

/* ── Darren Hardy cutout ── */
.dh-figure {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  height: 95%;
  z-index: 10;
  pointer-events: none;
  display: flex;
  align-items: flex-end;
}

.dh-figure img {
  height: 100%;
  width: auto;
  display: block;
  /* screen blend: dark background pixels become transparent */
  mix-blend-mode: screen;
  filter: contrast(1.08) brightness(1.06);
}

/* Fallback placeholder when dh.jpg isn't present */
.dh-figure .placeholder {
  height: 100%;
  aspect-ratio: 2/3;
  background: linear-gradient(to top, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
  border: 1px dashed rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.4;
  color: #fff;
}

/* ── Below-hero content ── */
.below-hero {
  padding: 80px 48px 120px;
  max-width: 1100px;
}

.below-hero .eyebrow {
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 20px;
}

.below-hero h1 {
  font-size: clamp(36px, 5vw, 72px);
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.05;
  margin-bottom: 28px;
}

.below-hero p {
  font-size: 18px;
  line-height: 1.75;
  color: #888;
  max-width: 580px;
}
</style>
</head>
<body>

<nav class="site-nav">
  <span class="logo">Darren Hardy &nbsp;/&nbsp; SUCCESS</span>
</nav>

<section class="hero">
  <div id="wall"></div>

  <div class="dh-figure" id="dhFigure">
    <!-- dh.jpg swapped in by JS if file exists; falls back to placeholder -->
  </div>
</section>

<div class="below-hero">
  <p class="eyebrow">New York Times Bestselling Author</p>
  <h1>Darren Hardy</h1>
  <p>Publisher emeritus of SUCCESS magazine, keynote speaker, and high-performance mentor to the world's most successful leaders.</p>
</div>

<script>
// ── All 63 covers (colour, uniform size — they're the wall, not the gallery) ──
const covers = [
  'SM_10_12_SHRIVER.jpg','SM_13_05_FORD.jpg','SM_12_01_DOWNEY.jpg',
  'SM_09_07_BRANSON.jpg','SM_12_08_BRANSON.jpg','JackWelch.jpg',
  'SM_08_01_Kiyosaki.jpg','SM_08_02_50.jpg','SM_08_04_OZ.jpg',
  'SM_08_05_HAWK.jpg','SM_08_06_Deutsch.jpg','SM_09_01_Robbins.jpg',
  'SM_09_02_Powell.jpg','SM_09_03_FOREMAN.jpg','SM_09_04_Maxwell.jpg',
  'SM_09_05_ORMAN.jpg','SM_09_06_LANCE.jpg','SM_09_08_FOX.jpg',
  'SM_09_09_FOSTER_Barcode.jpg','SM_09_10_SERENA_barcode.jpg',
  'SM_09_11_OSTEEN_barcode.jpg','SM_09_12_DrPHIL.jpg',
  'SM_12_07_TECHNOLOGY.jpg','SM_10_01_KEYES.jpg','SM_10_02_RAMSEY.jpg',
  'SM_10_03_HOPKINS.jpg','SM_10_04_COLLINS.jpg','SM_10_05_MICHAELS.jpg',
  'SM_10_06_JOBS.jpg','SM_10_07_COLE.jpg','SM_10_08_JOHNSON.jpg',
  'SM_10_09_DELL.jpg','SM_10_10_USHER.jpg','SM_10_11_MANNINGS.jpg',
  'SM_11_01_HOWARD.jpg','SM_11_02_CHAN.jpg','SM_11_03_SCHWAB.jpg',
  'SM_11_04_SCHULTZ.jpg','SM_11_05_ZUCKERBERG.jpg','SM_11_06_MARTIN.jpg',
  'SM_11_07_DICAPRIO.jpg','SM_11_08_BEZOS.jpg','SM_11_09_CONNICK.jpg',
  'SM_11_10_OZ.jpg','SM_11_11_CUBAN.jpg','SM_11_12_SANTA.jpg',
  'SM_12_02_KARDASHIAN.jpg','SM_12_03_BLOOMBERG.jpg','SM_12_04_LOWE.jpg',
  'SM_12_05_ORMAN.jpg','SM_12_06_JOHANNSON.jpg','SM_12_09_BURNETT.jpg',
  'SM_12_10_MAXWELL.jpg','SM_12_11_WASHINGTON.jpg','SM_12_12_COURIC.jpg',
  'SM_13_01_STEWART.jpg','SM_13_02_MUSK.jpg','SM_13_03_CORCORAN.jpg',
  'SM_13_04_DIAMANDIS.jpg','SM_08_03_Trump.jpg','SM_14_11_COOK.jpg',
  'Santa1977.jpg','Tony_Hseih.jpg'
];

// ── Render wall tiles ─────────────────────────────────────────────────────
const wall = document.getElementById('wall');
covers.forEach((c, i) => {
  const tile = document.createElement('div');
  tile.className = 'tile';
  const img = document.createElement('img');
  img.src     = `covers/${c}`;
  img.alt     = '';
  img.loading = i < 24 ? 'eager' : 'lazy';
  img.decoding = 'async';
  tile.appendChild(img);
  wall.appendChild(tile);
});

// Staggered fade-in for the wall tiles
document.querySelectorAll('#wall .tile').forEach((t, i) =>
  setTimeout(() => t.classList.add('visible'), i * 30)
);

// ── DH figure — swap in real image or show placeholder ───────────────────
const fig = document.getElementById('dhFigure');
const dhImg = new Image();
dhImg.onload = () => {
  dhImg.className = '';
  dhImg.alt       = 'Darren Hardy';
  fig.appendChild(dhImg);
};
dhImg.onerror = () => {
  const ph = document.createElement('div');
  ph.className   = 'placeholder';
  ph.textContent = 'Drop dh.jpg here';
  fig.appendChild(ph);
};
dhImg.src = 'dh.jpg';
</script>
</body>
</html>
